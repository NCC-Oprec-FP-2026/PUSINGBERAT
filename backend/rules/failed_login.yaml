id: failed-login-001
name: "Failed Login Attempt"
description: "Detects any authentication failure reported by PAM in syslog"
enabled: true
severity: medium

log_types:
  - syslog

conditions:
  - field: message
    operator: contains
    value: "authentication failure"

alert:
  title: "Failed Login on {{hostname}}"
  description: "Authentication failure detected: {{message}}"
