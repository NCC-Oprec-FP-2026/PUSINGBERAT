id: ssh-brute-force-001
name: "SSH Brute Force Detected"
description: "Detects repeated SSH authentication failures from the same source host"
enabled: true
severity: high

log_types:
  - syslog

conditions:
  - field: message
    operator: contains
    value: "Failed password"
  - field: process
    operator: equals
    value: "sshd"

threshold:
  count: 5
  window_seconds: 60
  group_by: hostname

alert:
  title: "SSH Brute Force: {{hostname}}"
  description: "{{count}} failed SSH login attempts in {{window_seconds}}s on host {{hostname}}"
