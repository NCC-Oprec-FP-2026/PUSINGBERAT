root = "."
tmp_dir = "/tmp/air_build"

[build]
cmd = "go build -o /tmp/air_build/siem-server ./cmd/server"
bin = "/tmp/air_build/siem-server"
include_ext = ["go", "tpl", "tmpl", "yaml", "yml"]
exclude_dir = ["vendor", "testdata", "migrations"]
delay = 500

[log]
time = true

[color]
main = "magenta"
watcher = "cyan"
build = "yellow"
runner = "green"

[misc]
clean_on_exit = true