services:
  postgres:
    image: postgres:16-alpine
    container_name: pusingberat-postgres-dev
    environment:
      POSTGRES_DB: pusingberat
      POSTGRES_USER: siem
      POSTGRES_PASSWORD: siempass
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
      - ./backend/migrations/001_create_tables.sql:/docker-entrypoint-initdb.d/001_create_tables.sql:ro
      - ./backend/migrations/002_add_indexes.sql:/docker-entrypoint-initdb.d/002_add_indexes.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U siem -d pusingberat"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  backend:
    image: golang:1.26-alpine
    container_name: pusingberat-backend-dev
    working_dir: /app/backend
    command: sh -c "go mod download && go run ./cmd/server"
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: pusingberat
      DB_USER: siem
      DB_PASSWORD: siempass
      SERVER_PORT: "8080"
      DISCORD_WEBHOOK_URL: ""
      RULES_DIR: /app/backend/rules
      LOG_LEVEL: debug
    ports:
      - "8080:8080"
    volumes:
      - ./backend:/app/backend
      - go_mod_cache:/go/pkg/mod
      - go_build_cache:/root/.cache/go-build
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/api/v1/health >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  frontend:
    image: node:24-alpine
    container_name: pusingberat-frontend-dev
    working_dir: /app/frontend
    command: sh -c "npm ci && npm run dev -- --host 0.0.0.0 --port 5173"
    environment:
      VITE_API_BASE_URL: http://localhost:8080/api/v1
      VITE_WS_BASE_URL: ws://localhost:8080/ws
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app/frontend
      - frontend_node_modules:/app/frontend/node_modules
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  flask:
    image: python:3.13-slim
    container_name: pusingberat-flask-dev
    working_dir: /app/frontend-server
    command: sh -c "pip install --no-cache-dir -r requirements.txt && flask --app app run --host 0.0.0.0 --port 5000 --debug"
    environment:
      FLASK_ENV: development
      VITE_DEV_SERVER_URL: http://frontend:5173
      BACKEND_API_URL: http://backend:8080/api/v1
    ports:
      - "5000:5000"
    volumes:
      - ./frontend-server:/app/frontend-server
      - ./frontend/dist:/app/frontend/dist:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:5000/health', timeout=2).read()\""]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  postgres_dev_data:
  go_mod_cache:
  go_build_cache:
  frontend_node_modules:
