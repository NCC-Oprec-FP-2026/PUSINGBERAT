# ============================================================
# SonarQube Project Configuration — PUSINGBERAT SIEM
# ============================================================
# This file is read by sonar-scanner during the Jenkins pipeline.
# Ref: https://docs.sonarqube.org/latest/analyzing-source-code/scanners/sonarscanner/

sonar.projectKey=pusingberat
sonar.projectName=PUSINGBERAT SIEM
sonar.projectVersion=1.0

# ============================================================
# SOURCE ROOTS
# CI quality gate currently focuses on the backend units that have meaningful
# automated coverage in this sprint. Broaden this list as API/repository/service
# tests are added.
# ============================================================
sonar.sources=backend/internal

# ============================================================
# GO BACKEND
# ============================================================
# Exclude vendor dir (if ever used) and generated files.
sonar.exclusions=\
  backend/vendor/**,\
  frontend/node_modules/**,\
  frontend/dist/**,\
  frontend/coverage/**

# Go test files are analysed separately via the test config below.
sonar.tests=backend/internal
sonar.test.inclusions=backend/internal/**/*_test.go

# Coverage report generated by:
#   cd backend && go test -coverprofile=coverage.out ./...
sonar.go.coverage.reportPaths=backend/coverage.out

# ============================================================
# VUE 3 / TYPESCRIPT FRONTEND
# ============================================================
# If vitest + @vitest/coverage-v8 is added later, point to:
# sonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info

# ============================================================
# ENCODING
# ============================================================
sonar.sourceEncoding=UTF-8
