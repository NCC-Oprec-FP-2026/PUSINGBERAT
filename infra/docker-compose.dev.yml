name: pusingberat-dev

networks:
    siem_dev_net:
        driver: bridge

services:
    postgres:
        image: postgres:16-alpine
        container_name: pusingberat_postgres_dev
        restart: unless-stopped
        env_file: ../.env
        environment:
            POSTGRES_DB: ${POSTGRES_DB}
            POSTGRES_USER: ${POSTGRES_USER}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
        ports:
            - "${POSTGRES_HOST_PORT:-5432}:5432"
        volumes:
            - postgres_dev_data:/var/lib/postgresql/data
            - ../backend/migrations/001_create_tables.sql:/docker-entrypoint-initdb.d/001_create_tables.sql:ro
            - ../backend/migrations/002_add_indexes.sql:/docker-entrypoint-initdb.d/002_add_indexes.sql:ro
        healthcheck:
            test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
            interval: 5s
            timeout: 5s
            retries: 10
            start_period: 10s
        networks:
            - siem_dev_net

    backend:
        build:
            context: ../backend
            dockerfile: Dockerfile.dev
        container_name: pusingberat_backend_dev
        restart: unless-stopped
        env_file: ../.env
        environment:
            DB_HOST: postgres
            DB_PORT: 5432
            DB_NAME: ${POSTGRES_DB}
            DB_USER: ${POSTGRES_USER}
            DB_PASSWORD: ${POSTGRES_PASSWORD}
            BACKEND_PORT: ${BACKEND_PORT:-8080}
            DISCORD_WEBHOOK_URL: ${DISCORD_WEBHOOK_URL}
            RULES_DIR: ${RULES_DIR}
            LOG_LEVEL: ${LOG_LEVEL:-debug}
            GIN_MODE: debug
        ports:
            - "${BACKEND_PORT:-8080}:8080"
        volumes:
            - ../backend:/app
            - go_mod_cache:/go/pkg/mod
            - /var/log:/host/var/log:ro
        depends_on:
            postgres:
                condition: service_healthy
        networks:
            - siem_dev_net

    frontend:
        image: node:20-alpine
        # build:
        #     context: ../frontend
        #     dockerfile: Dockerfile.dev
        container_name: pusingberat_frontend_dev
        restart: unless-stopped
        working_dir: /app
        command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
        environment:
            VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8080}
            VITE_WS_URL: ${VITE_WS_URL:-ws://localhost:8080/ws}
            NODE_ENV: development
        ports:
            - "5173:5173"
        volumes:
            - ../frontend:/app
            - /app/node_modules
        depends_on:
            - backend
        networks:
            - siem_dev_net
    flask:
        build:
            context: ../frontend-server
            dockerfile: Dockerfile.dev
        container_name: pusingberat_flask_dev
        restart: unless-stopped
        command: python app.py
        environment:
            FLASK_APP: app.py
            FLASK_DEBUG: "1"
            FLASK_RUN_HOST: "0.0.0.0"
            FLASK_RUN_PORT: "5000"
        ports:
            - "5000:5000"
        volumes:
            - ../frontend-server:/app
        depends_on:
            - backend
        networks:
            - siem_dev_net

volumes:
    postgres_dev_data:
    go_mod_cache:
