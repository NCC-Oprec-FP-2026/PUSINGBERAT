name: pusingberat-dev

networks:
    siem_dev_net:
        driver: bridge

services:
    postgres:
        image: postgres:16-alpine
        container_name: pusingberat_postgres_dev
        restart: unless-stopped
        environment:
            POSTGRES_DB: ${POSTGRES_DB:-pusingberat}
            POSTGRES_USER: ${POSTGRES_USER:-siem}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-siempass}
        ports:
            - "${POSTGRES_HOST_PORT:-5432}:5432"
        volumes:
            - postgres_dev_data:/var/lib/postgresql/data
            - ../backend/migrations/001_create_tables.sql:/docker-entrypoint-initdb.d/001_create_tables.sql:ro
            - ../backend/migrations/002_add_indexes.sql:/docker-entrypoint-initdb.d/002_add_indexes.sql:ro
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-siem} -d ${POSTGRES_DB:-pusingberat}"]
            interval: 5s
            timeout: 5s
            retries: 10
            start_period: 10s
        networks:
            - siem_dev_net

    backend:
        build:
            context: ../backend
            dockerfile: Dockerfile.dev
        container_name: pusingberat_backend_dev
        restart: unless-stopped
        environment:
            DB_HOST: ${DB_HOST:-postgres}
            DB_PORT: ${DB_PORT:-5432}
            DB_NAME: ${DB_NAME:-pusingberat}
            DB_USER: ${DB_USER:-siem}
            DB_PASSWORD: ${DB_PASSWORD:-siempass}
            SERVER_PORT: ${SERVER_PORT:-8080}
            DISCORD_WEBHOOK_URL: ${DISCORD_WEBHOOK_URL:-}
            RULES_DIR: ${RULES_DIR:-/app/rules}
            LOG_LEVEL: ${LOG_LEVEL:-debug}
            GIN_MODE: debug
        ports:
            - "${SERVER_PORT:-8080}:8080"
        volumes:
            - ../backend:/app
            - go_mod_cache:/go/pkg/mod
            - go_build_cache:/root/.cache/go-build
            - /var/log:/host/var/log:ro
        depends_on:
            postgres:
                condition: service_healthy
        healthcheck:
            test: ["CMD-SHELL", "wget -qO- http://localhost:${SERVER_PORT:-8080}/api/v1/health >/dev/null 2>&1"]
            interval: 10s
            timeout: 5s
            retries: 10
        networks:
            - siem_dev_net

    frontend:
        build:
            context: ../frontend
            dockerfile: Dockerfile.dev
        container_name: pusingberat_frontend_dev
        restart: unless-stopped
        working_dir: /app
        command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
        environment:
            VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8080}
            VITE_WS_URL: ${VITE_WS_URL:-ws://localhost:8080/ws}
            NODE_ENV: development
        ports:
            - "5173:5173"
        volumes:
            - ../frontend:/app
            - frontend_node_modules:/app/node_modules
        depends_on:
            backend:
                condition: service_healthy
        networks:
            - siem_dev_net

    flask:
        build:
            context: ../frontend-server
            dockerfile: Dockerfile.dev
        container_name: pusingberat_flask_dev
        restart: unless-stopped
        command: flask --app app run --host 0.0.0.0 --port 5000 --debug
        environment:
            FLASK_APP: app.py
            FLASK_DEBUG: "1"
            FLASK_RUN_HOST: "0.0.0.0"
            FLASK_RUN_PORT: "5000"
        ports:
            - "5000:5000"
        volumes:
            - ../frontend-server:/app
        depends_on:
            backend:
                condition: service_healthy
        healthcheck:
            test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:5000/health', timeout=2).read()\""]
            interval: 10s
            timeout: 5s
            retries: 10
        networks:
            - siem_dev_net

volumes:
    postgres_dev_data:
    go_mod_cache:
    go_build_cache:
    frontend_node_modules:
