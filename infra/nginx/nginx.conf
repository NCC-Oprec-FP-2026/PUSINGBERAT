# ============================================================
# Nginx Reverse Proxy - PUSINGBERAT SIEM (Production)
# ============================================================
#
# Routing:
#   /api/*  -> Go backend (port 8080)
#   /ws     -> Go backend WebSocket (port 8080)
#   /*      -> Flask frontend server (port 5000)
# ============================================================

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent"';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    sendfile on;
    keepalive_timeout 65;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;

    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/m;

    upstream backend {
        server backend:8080;
    }

    upstream flask {
        server flask:5000;
    }

    server {
        listen 80;
        server_name pusingberat.my.id www.pusingberat.my.id;

        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name pusingberat.my.id www.pusingberat.my.id;

        ssl_certificate /etc/letsencrypt/live/pusingberat.my.id/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/pusingberat.my.id/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;

        location /ws {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }

        location /api/ {
            limit_req zone=api_limit burst=10 nodelay;
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 10s;
            proxy_read_timeout 30s;
        }

        location / {
            proxy_pass http://flask;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 10s;
            proxy_read_timeout 30s;
        }
    }
}
