# ============================================================
# Nginx Reverse Proxy — PUSINGBERAT SIEM (Production)
# ============================================================
#
# Routing:
#   /api/*  → Go backend (port 8080)
#   /ws     → Go backend WebSocket (port 8080)
#   /*      → Flask frontend server (port 5000)
#
# WebSocket needs special headers (Upgrade, Connection).
# ============================================================

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ──────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent"';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    sendfile        on;
    keepalive_timeout 65;

    # ── Gzip compression ─────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;

    # ── Rate limiting: 30 req/min per IP on /api/ ────────────
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/m;

    # ── Upstream definitions ──────────────────────────────────
    upstream backend {
        server backend:8080;
    }

    upstream flask {
        server flask:5000;
    }

    # ── Main server block ─────────────────────────────────────
    # ── HTTP Redirect to HTTPS ────────────────────────────────
    server {
        listen 80;
        server_name pusingberat.my.id www.pusingberat.my.id;
        
        # Redirect all HTTP requests to HTTPS
        return 301 https://$host$request_uri;
    }

    # ── Main HTTPS Server Block ───────────────────────────────
    server {
        listen 443 ssl;
        server_name pusingberat.my.id www.pusingberat.my.id;

        # Point Nginx to the Let's Encrypt certificates mapped from the host
        ssl_certificate /etc/letsencrypt/live/pusingberat.my.id/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/pusingberat.my.id/privkey.pem;
        
        # Basic security protocols
        ssl_protocols TLSv1.2 TLSv1.3;

        # ── WebSocket proxy (must come before /api/) ──────────
        location /ws {
            proxy_pass         http://backend;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host             $host;
            proxy_set_header   X-Real-IP        $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout  86400s;
            proxy_send_timeout  86400s;
        }

        # ── REST API proxy ────────────────────────────────────
        location /api/ {
            limit_req zone=api_limit burst=10 nodelay;
            proxy_pass         http://backend;
            proxy_http_version 1.1;
            proxy_set_header   Host             $host;
            proxy_set_header   X-Real-IP        $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_connect_timeout 10s;
            proxy_read_timeout    30s;
        }

        # ── Flask frontend (SPA catch-all) ────────────────────
        location / {
            proxy_pass         http://flask;
            proxy_http_version 1.1;
            proxy_set_header   Host             $host;
            proxy_set_header   X-Real-IP        $remote_addr;
            proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_connect_timeout 10s;
            proxy_read_timeout    30s;
        }
    }
}
